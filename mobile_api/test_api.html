<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile API Tester</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            background: #f0fdf4;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        h2 {
            margin-top: 0;
            color: #166534;
        }

        input {
            display: block;
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 0.25rem;
        }

        button {
            background: #166534;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }

        button:hover {
            background: #14532d;
        }

        pre {
            background: #eee;
            padding: 1rem;
            border-radius: 0.25rem;
            overflow-x: auto;
        }

        .response-area {
            margin-top: 1rem;
            border: 1px solid #ddd;
            padding: 1rem;
            min-height: 50px;
            background: #fafafa;
        }
    </style>
</head>

<body>
    <h1>Mobile Backend API Tester</h1>
    <p>Use this tool to verify your mobile app backend endpoints while waiting for Node.js to install.</p>

    <!-- Login Test -->
    <div class="card">
        <h2>Test Login Endpoint (login.php)</h2>
        <input type="email" id="loginEmail" placeholder="Email (e.g. user@example.com)">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="testLogin()">Send POST Request</button>
        <div class="response-area" id="loginResponse">Response will appear here...</div>
    </div>

    <!-- Signup Test -->
    <div class="card">
        <h2>Test Signup Endpoint (signup.php)</h2>
        <input type="text" id="signupName" placeholder="Full Name">
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPass" placeholder="Password">
        <button onclick="testSignup()">Send POST Request</button>
        <div class="response-area" id="signupResponse">Response will appear here...</div>
    </div>

    <script>
        async function testLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;
            const output = document.getElementById('loginResponse');

            output.innerHTML = 'Sending request...';

            try {
                const res = await fetch('login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                output.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                if (data.success) output.style.borderLeft = "5px solid green";
                else output.style.borderLeft = "5px solid red";
            } catch (err) {
                output.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
            }
        }

        async function testSignup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPass').value;
            const output = document.getElementById('signupResponse');

            output.innerHTML = 'Sending request...';

            try {
                const res = await fetch('signup.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                output.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                if (data.success) output.style.borderLeft = "5px solid green";
                else output.style.borderLeft = "5px solid red";
            } catch (err) {
                output.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
            }
        }
    </script>
</body>

</html>
